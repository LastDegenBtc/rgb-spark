[package]
edition = "2021"
rust-version = "1.82.0"
name = "rgb-consensus"
version = "0.11.1-rc.6"
authors = ["Zoe Faltibà <zoefaltiba@gmail.com>"]
build = false
exclude = [".github"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "RGB Consensus Library: confidential & scalable smart contracts on Bitcoin & Lightning (consensus layer)"
homepage = "https://rgb.info"
readme = "README.md"
keywords = [
    "bitcoin",
    "lightning",
    "rgb",
    "smart-contracts",
    "lnp-bp",
]
categories = ["cryptography::cryptocurrencies"]
license = "Apache-2.0"
repository = "https://github.com/rgb-protocol/rgb-consensus"

[package.metadata.docs.rs]
features = ["all"]

[features]
all = [
    "stl",
    "serde",
]
default = []
serde = [
    "serde_crate",
    "amplify/serde",
    "strict_encoding/serde",
    "strict_types/serde",
    "commit_verify/serde",
    "bp-core/serde",
    "aluvm/serde",
    "secp256k1/serde",
]
stl = [
    "commit_verify/stl",
    "bp-core/stl",
    "aluvm/stl",
]

[lib]
name = "rgbcore"
crate-type = [
    "cdylib",
    "rlib",
]
path = "src/lib.rs"

[[bin]]
name = "rgbcore-stl"
path = "src/bin/rgbcore-stl.rs"
required-features = ["stl"]

[dependencies.aluvm]
version = "~0.11.1-alpha.2"
features = [
    "std",
    "ascii-armor",
]

[dependencies.amplify]
version = "~4.8.0"
features = ["rand"]

[dependencies.baid64]
version = "~0.4.1"

[dependencies.bp-core]
version = "~0.11.1-alpha.2"

[dependencies.chrono]
version = "0.4.38"

[dependencies.commit_verify]
version = "0.11.1-alpha.2"
features = [
    "rand",
    "derive",
]

[dependencies.daggy]
version = "0.9.0"
features = ["serde-1"]

[dependencies.mime]
version = "~0.3.17"

[dependencies.secp256k1]
version = "0.30.0"
features = ["global-context"]

[dependencies.serde_crate]
version = "1"
features = ["derive"]
optional = true
package = "serde"

[dependencies.single_use_seals]
version = "~0.11.1-alpha.2"

[dependencies.strict_encoding]
version = "~2.8.2"

[dependencies.strict_types]
version = "~2.8.3"
features = ["armor"]

[target.'cfg(target_arch = "wasm32")'.dependencies.getrandom]
version = "0.3"
features = ["wasm_js"]

[target.'cfg(target_arch = "wasm32")'.dependencies.rand]
version = "0.9.1"
optional = true

[target.'cfg(target_arch = "wasm32")'.dependencies.wasm-bindgen]
version = "0.2"

[target.'cfg(target_arch = "wasm32")'.dev-dependencies.wasm-bindgen-test]
version = "0.3"

# spark-utk fork — redirect the entire bp-core family (consensus, dbc,
# seals, umbrella) to our local fork. Patching only bp-dbc creates a
# type-identity split because bp-seals (from crates.io) would still pull
# the unpatched bp-consensus, giving two distinct `bc::Tx` types.
[patch.crates-io]
bp-consensus = { path = "../bp-core/consensus" }
bp-dbc = { path = "../bp-core/dbc" }
bp-seals = { path = "../bp-core/seals" }
bp-core = { path = "../bp-core" }
